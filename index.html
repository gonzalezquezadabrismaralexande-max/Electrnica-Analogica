<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrónica Analógica - Organizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="flex flex-col items-center py-10">
        <div class="bg-black text-white p-2 rounded-lg mb-4">
            <i class="fa-solid fa-book-open text-xl"></i>
        </div>
        <h1 class="text-4xl font-bold mb-2 text-center">Electrónica Analógica</h1>
        <p class="text-gray-500">Listado general de tareas y proyectos del curso</p>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Todas las Asignaciones</h2>
            <span class="bg-gray-200 text-gray-600 px-3 py-1 rounded-full text-xs font-semibold">20 tareas</span>
        </div>

        <div class="space-y-3">
            
            <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                <div class="flex items-center space-x-4">
                    <div class="bg-gray-100 p-3 rounded-lg text-gray-400">
                        <i class="fa-regular fa-file-lines text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800">Practica #1: Medición de resistencia en serie con diodo y fuente variable</h3>
                        <p class="text-sm text-gray-400">Documento disponible</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button class="flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50">
                        <i class="fa-solid fa-download mr-2 text-gray-500"></i> Descargar
                    </button>
                    <button class="px-4 py-2 bg-black text-white rounded-lg text-sm font-medium hover:bg-gray-800">
                        Abrir <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                <div class="flex items-center space-x-4">
                    <div class="bg-gray-100 p-3 rounded-lg text-gray-400">
                        <i class="fa-regular fa-file-lines text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800">Practica #2: Rectificador de media onda y de onda completa</h3>
                        <p class="text-sm text-gray-400">Documento disponible</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button class="flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50">
                        <i class="fa-solid fa-download mr-2 text-gray-500"></i> Descargar
                    </button>
                    <button class="px-4 py-2 bg-black text-white rounded-lg text-sm font-medium hover:bg-gray-800">
                        Abrir <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
